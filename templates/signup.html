<!DOCTYPE html>
<html lang="en">
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-circle">🩺</div>
            <h1>Create Account</h1>
            <p>Join MedicalBot-your AI health Assistant</p>
        </div>

        <div class="error-box" id="error-box"></div>


        <div class="field">
            <label>Full Name</label>
            <input type="text" id="username" placeholder="User name" onkeydown="if(event.key==='Enter') signup()"/>
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter') signup()"/>
        </div>

        <div class="field">
            <label>Password (min 6 characters)</label>
            <input type="password" id="password" placeholder="Create a Password" onkeydown="if(event.key==='Enter') signup()"/>
        </div>

        <button class="auth-btn" id="signup-btn" onclick="signup()">Create Account</button>

        <div class="auth-footer">
            Already have an account?
            <a href="/">Sign in</a>
        </div>

    </div>
</div>

<script>
async function signup() {

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn=document.getElementById("signup-btn");

    //validation
    if(!username || !email || !password){
        showError("All fields are required")
        return;
    }
    if (password.length < 6) {
        showError("Password must be at least 6 characters");
        return;
    }
    btn.disabled = true;
    btn.textContent = "Creating account...";
    document.getElementById("error-box").classList.remove("show");

    try {
        const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                email,
                password
            })
        });

        const data = await response.json();

        if (data.token) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("username", data.user.username);
            window.location.href = "/chat-page";
        } else {
            showError(data.error || "Registration failed. Try again");
        }
    } catch (error) {
        showError("Cannot connect to server");
    } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
    }
}
function showError(msg) {
    const el = document.getElementById("error-box");
    el.textContent = msg;
    el.classList.add("show");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width",initial-scale=1.0/>
    <title>AI Doctor Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>


<div class="auth-wrapper">
    <div class="auth-card">
    <!--Logo-->
        <div class="auth-logo">
            <div class="logo-circle">🩺</div>
            <h1>AI Doctor Login</h1>
            <p>AI_powered medical assistant</p>
        </div>
    
    <!--Error Box-->
        <div class="error-box" id="error-box"></div>

    <!--Email find-->
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter') login()"/>
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your Password" onkeydown="if(event.key==='Enter') login()"/>
        </div>

    <!--Login button-->
    <button class="auth-btn" id="login-btn" onclick="login()">Sign In</button>
    
    
        <div class="auth-footer">
            Don't have an account?
            <a href="signup-page">Create one</a>
        </div>
    </div>
</div>

<script>
async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errBox = document.getElementById("error-box");
    const btn = document.getElementById("login-btn");

    if (!email || !password) {
        showError("Please enter your email and password.");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Signing in...";
    errBox.classList.remove("show");

    try {
        const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await response.json();

        if (data.token) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("username", data.user.username);
            window.location.href = "/chat-page";
        } else {
            showError(data.error || "Invalid email or password.");
        }
    } catch {
        showError("Cannot connect to server.");
    } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
    }

    function showError(msg) {
        errBox.textContent = msg;
        errBox.classList.add("show");
    }
}
</script>

</body>
</html>
